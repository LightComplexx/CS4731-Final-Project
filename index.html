<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>CS 4731 Final Project Part I</title>
        <script id="vshader" type="x-shader/x-vertex">
            attribute vec4 vPosition;
            attribute vec4 vNormal;
            attribute vec2 vTexCoord;
            attribute vec2 vTexCoordSky;

            uniform mat4 modelMatrix;
            uniform mat4 projMatrix;
            uniform mat4 viewMatrix;
            uniform vec3 spotlightDirection;
            uniform vec4 lightPosition;

            varying vec3 L, N, V, S;
            varying vec2 fTexCoord;
            varying vec2 fTexCoordSky;

            uniform bool isSkybox;

            void main() {
                if (isSkybox) {
                    fTexCoordSky = vTexCoordSky;
                    gl_Position = projMatrix * viewMatrix * modelMatrix * vPosition;
                // convert normal position to calc lightning vector
                } else {
                    mat4 modelViewMatrix = viewMatrix * modelMatrix;
                vec3 pos = (modelViewMatrix * vPosition).xyz;
                vec3 lightPositionEye = (viewMatrix * lightPosition).xyz;

                // light vector
                L = normalize(lightPositionEye.xyz - pos);

                // normal vector
                N = normalize((modelViewMatrix * vec4(vNormal.xyz, 0.0)).xyz);
                
                // view vector
                V = normalize(-pos);

                gl_Position = projMatrix * modelViewMatrix * vPosition;
                fTexCoord = vTexCoord;
                }
            }
        </script>

        <script id="fshader" type="x-shader/x-fragment">
            precision mediump float;

            uniform sampler2D textureMap;

            uniform vec4 vDiffuse;
            uniform vec4 vSpecular;
            uniform vec4 vAmbient;

            uniform vec4 lightDiffuse;
            uniform vec4 lightSpecular;
            uniform vec4 lightAmbient;

            uniform float shininess;

            uniform vec3 spotlightDirection;
            uniform float spotlightCutoff;

            varying vec2 fTexCoordSky;
            uniform sampler2D skyMap;
            uniform bool isSkybox;

            varying vec3 L, N, V;
            varying vec2 fTexCoord;
            
            void main() {
                if (isSkybox) {
                    gl_FragColor = texture2D(skyMap, fTexCoordSky);
                } else {
                    vec3 Ln = normalize(L);
                    vec3 Nn = normalize(N);
                    vec3 Vn = normalize(V);

                    float d = max(dot(Ln, Nn), 0.0);
                    float spotlight = max(dot(normalize(-Ln), normalize(spotlightDirection)), 0.0);

                    // ambient
                    vec4 ambient = lightAmbient * vAmbient;

                    if (spotlight < spotlightCutoff) {
                        gl_FragColor = ambient;
                        return;
                    }

                    // diffuse
                    vec4 diffuse = 2.0 * lightDiffuse * vDiffuse * d * spotlight;
            
                    // specular
                    vec4 specular = vec4(0.0);
                    if (d > 0.0) {
                        vec3 R = reflect(-Ln, Nn);
                        specular = lightSpecular * vSpecular * pow(max(dot(Vn, R), 0.0), shininess);
                    }

                    vec4 fColor = vDiffuse + diffuse + specular + ambient;
	                fColor.a = 1.0;

	                vec4 texColor = texture2D(textureMap, fTexCoord);

                    gl_FragColor = texColor + fColor;
                }
            }
        </script>

        <script type="text/javascript" src="lib/webgl-utils.js"></script>
        <script type="text/javascript" src="lib/initShaders.js"></script>
        <script type="text/javascript" src="lib/MV.js"></script>

        <script type="text/javascript" src="lib/model.js"></script>
        <script type="text/javascript" src="lib/face.js"></script>
        <script type="text/javascript" src="main.js"></script>

    </head>

    <body onload="main()">
        <h1 id="mode">CS 4731 Final Project</h1>

        <canvas id="webgl" class="box" width="1600" height="900">
            Please use a browser that supports the "canvas" tag.
        </canvas>
    </body>
</html>
